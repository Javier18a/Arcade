<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Arcade Noxx</title>
  <link rel="stylesheet" href="lg.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="login-wrapper">
    <aside class="sidebar">

      <nav class="menu-links">
        <a href="#"><i class="fas fa-home"></i> Inicio</a>
        <a href="#"><i class="fas fa-info-circle"></i> Info</a>
        <a href="#"><i class="fas fa-shield-alt"></i> Seguridad</a>
        <a href="#"><i class="fas fa-phone"></i> Soporte</a>
        <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Salir</a>
      </nav>
    </aside>

    <main class="login-content">
      <section class="login-card">
        <h2>Iniciar sesión</h2>
        <form action="#" method="post" id="loginForm">
          <label for="user">Usuario</label>
          <input id="email" name="email" type="text" required placeholder="Usuario">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" required placeholder="********">
          <button type="submit"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        </form>
        <div class="extra-row">
          <a href="register.html">Registrate</a>
        </div>
      </section>
    </main>
  </div>

  <script src="lg.js"></script>
</body>
</html>
