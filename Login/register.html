<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Registro - Arcade Noxx</title>
</head>
<body>

    <main class="login-content">
        <section class="login-card">
            <h2>Crear cuenta</h2>
            <form id="registerForm">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" required placeholder="Ingresa tu usuario">

                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="********">

                <label for="confirmPassword">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" required placeholder="********">

                <button type="submit">
                    Crear cuenta
                </button>

                <button type="button" onclick="window.location.href='login.html'">
                    Regresar a login
                </button>
            </form>

            <div class="extra-row">
                <a href="login.html">¿Ya tienes cuenta? Iniciar sesión</a>
            </div>
        </section>
    </main>

    <script src="register.js"></script>
</body>
</html>
