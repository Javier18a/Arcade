<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div class="game-container">
        
        <div class="game-area">
            <h1>🐍 Snake Game</h1>
            <canvas id="game" width="400" height="400"></canvas>
            <button onclick="window.location.href='../index.html'" style="margin-top: 30px;">Regresar</button>
        </div>

        <div class="paneles">

            <div class="scoreboard">
                <h2>Tiempo Real</h2>
                <p>Puntaje: <span id="puntaje">0</span></p>
                <p>Longitud: <span id="longitud">1</span></p>
                <p>Movimientos: <span id="movimientos">0</span></p>
            </div>

            <div class="records">
                <h2>Récords</h2>
                <p>Mejor puntaje: <span id="recordPuntaje">0</span></p>
                <p>Mayor longitud: <span id="recordLongitud">0</span></p>
                <p>Más movimientos: <span id="recordMovimientos">0</span></p>
                <button onclick="reiniciar()">Reiniciar</button>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
