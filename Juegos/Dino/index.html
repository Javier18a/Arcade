<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dino Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div class="game-container">
        
        <div class="game-area">
            <h1>🦖 Dino Game</h1>
            <canvas id="game" width="600" height="200"></canvas>
            <button onclick="window.location.href='../index.html'" style="margin-top: 30px;">Regresar</button>
        </div>

        <div class="paneles">

            <div class="scoreboard">
                <h2>Tiempo Real</h2>
                <p>Distancia: <span id="distancia">0</span></p>
                <p>Saltos: <span id="saltos">0</span></p>
                <p>Puntaje: <span id="puntaje">0</span></p>
            </div>

            <div class="records">
                <h2>Récords</h2>
                <p>Mejor distancia: <span id="recordDistancia">0</span></p>
                <p>Más saltos: <span id="recordSaltos">0</span></p>
                <p>Mejor puntaje: <span id="recordPuntaje">0</span></p>
                <button onclick="reiniciar()">Reiniciar</button>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
